name: gymnow
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_storage: ^12.4.3
  firebase_messaging: ^15.2.3
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.5
  http: ^1.3.0
  async: ^2.12.0
  fake_async: ^1.3.2
  leak_tracker: 11.0.2
  material_color_utilities: 0.11.1
  vm_service: 14.3.1
  image_picker: ^1.1.2
  video_player: ^2.9.5
  chewie: ^1.11.0
  permission_handler: ^11.4.0
  device_info_plus: ^11.3.3
  url_launcher: ^6.3.1
  razorpay_flutter: ^1.3.5
  fl_chart: ^0.36.4
  intl: ^0.18.0 # Added intl package
  tflite_flutter: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/findgym.jpg
    - assets/workplan.jpg
    - assets/dietplan.jpg
    - assets/logo_icon.png
    - assets/logo_full.jpg 
    - assets/ai/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo_icon.png"  # <--- Use the TRANSPARENT icon here
  min_sdk_android: 21
  